name: neurofitapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  google_fonts: ^8.0.2
  font_awesome_flutter: ^10.12.0
  provider: ^6.1.5+1
  lottie: ^3.3.2
  flutter_animate: ^4.5.2
  intl: ^0.20.2
  video_player: ^2.8.2
  smooth_page_indicator: ^1.1.0
  google_generative_ai: ^0.4.7
  health: ^13.3.1
  permission_handler: ^12.0.1
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/videos/screen1.mp4
    - assets/videos/screen2.mp4
    - assets/videos/screen3.mp4
    - assets/videos/signin_bg.mp4
    - assets/videos/signup_bg.gif

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0A0A0F"
  image: "assets/images/app_icon.png"
  android: true
  ios: true
  web: true
  fullscreen: true
  android_12:
    image: "assets/images/app_icon.png"
    icon_background_color: "#0A0A0F"
